

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เว็บแอปสุ่มนิทานสองภาษา</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google Noto Fonts:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* === การตั้งค่าโดยรวม === */
        :root {
            --thai-primary: #FFB74D; /* สีส้มอ่อน */
            --thai-secondary: #FFF3E0; /* สีครีมอ่อน */
            --thai-text: #BF360C; /* สีส้มเข้ม */
            --english-primary: #64B5F6; /* สีฟ้า */
            --english-secondary: #E3F2FD; /* สีฟ้าอ่อน */
            --english-text: #0D47A1; /* สีน้ำเงินเข้ม */
            --background-color: #FDFEFE;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Google Noto Fonts', Noto Sans Thai Looped;
            background-color: var(--background-color);
            margin: 0;
            padding: 20px;
            color: #333;
            -webkit-tap-highlight-color: transparent; /* ป้องกันแสงกระพริบเมื่อแตะบนมือถือ */
        }

        /* === โครงสร้างหลัก === */
        h1 {
            text-align: center;
            color: #4A4A4A;
            font-size: 2.8rem;
            margin-bottom: 30px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
        }

        .card {
            background-color: #FFFFFF;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            flex: 1;
            min-width: 400px; /* ขนาดขั้นต่ำสำหรับแต่ละหมวด */
            max-width: 800px;
            padding: 25px 30px;
            transition: transform 0.2s ease-in-out;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* === การจัดสไตล์แต่ละหมวด === */
        #thai-section {
            border-top: 10px solid var(--thai-primary);
        }

        #english-section {
            border-top: 10px solid var(--english-primary);
        }
        
        h2 {
            font-size: 2.2rem;
            margin-top: 0;
            border-left: 5px solid;
            padding-left: 15px;
        }

        #thai-section h2 { color: var(--thai-text); border-color: var(--thai-primary); }
        #english-section h2 { color: var(--english-text); border-color: var(--english-primary); }

        /* === ส่วนควบคุม (เลือกระดับชั้นและปุ่ม) === */
        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 25px;
        }

        select, button {
            font-family: 'Google Noto Fonts', Noto Sans Thai Looped;
            font-size: 1.5rem; /* ขนาดตัวอักษรสำหรับ iPad */
            padding: 12px 20px;
            border-radius: 12px;
            border: 2px solid transparent;
            cursor: pointer;
        }

        select {
            flex-grow: 1;
            background-color: #f0f0f0;
        }

        button {
            color: white;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        #thai-btn { background-color: var(--thai-primary); }
        #thai-btn:hover { background-color: #FFA726; }

        #english-btn { background-color: var(--english-primary); }
        #english-btn:hover { background-color: #42A5F5; }

        /* === ส่วนแสดงนิทาน === */
        .story-display {
            background-color: var(--background-color);
            border-radius: 15px;
            padding: 20px;
            min-height: 300px;
            font-size: 1.8rem; /* ปรับจาก 1.5rem เป็น 1.8rem เพื่อให้อ่านง่ายขึ้น */
            line-height: 1.8;
            color: #2c3e50;
        }

        #thai-story { background-color: var(--thai-secondary); }
        #english-story { background-color: var(--english-secondary); }

        .story-title {
            font-size: 2.0rem;
            font-weight: 700;
            margin-bottom: 15px;
        }
        #thai-story .story-title { color: var(--thai-text); }
        #english-story .story-title { color: var(--english-text); }
        
        /* === [!] จุดที่ปรับแก้: กำหนดขนาดภาพให้คงที่และจัดกึ่งกลาง === */
        .story-display img {
            max-width: 100%;    /* ให้ไม่เกินความกว้างของพื้นที่ */
            height: auto;       /* ปรับความสูงอัตโนมัติตามสัดส่วน */
            max-height: 300px;  /* **จำกัดความสูงสูงสุดไว้ที่ 300px** */
            width: auto;        /* **ให้ความกว้างปรับตามสัดส่วนเมื่อความสูงถูกจำกัด** */
            display: block;     /* เปลี่ยนเป็น block เพื่อใช้ margin: auto จัดกึ่งกลาง */
            margin: 15px auto;  /* จัดกึ่งกลางภาพ และเว้นระยะห่างด้านบน-ล่าง */
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .story-display p {
            margin-bottom: 1em;
        }
        
        .placeholder {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #999;
            font-size: 1.5rem;
        }
        
        /* === สไตล์เฉพาะสำหรับนิทานภาษาอังกฤษ === */
        .sentence-block {
            margin-bottom: 1.8em;
        }
        .english-sentence {
            color: #1565C0; /* น้ำเงินเข้ม */
            font-weight: 500;
        }
        .english-reading {
            color: #E65100; /* ส้มเข้ม */
            font-style: italic;
        }
        .english-translation {
            color: #2E7D32; /* เขียว */
        }

    </style>
</head>

        <div id="english-section" class="card">

            </div>
            <div id="english-story" class="story-display">
                <div class="placeholder">Select a grade and click "Random Story"</div>
            </div>
        </div>
    </div>

            thaiStoryDisplay.innerHTML = `
                <div class="story-title">${story.title}</div>
                <img src="${story.img}" alt="ภาพประกอบนิทานเรื่อง ${story.title}">
                <p>${story.content.replace(/\n/g, '<br>')}</p>
            `;
        });

        // --- ส่วนของภาษาอังกฤษ ---
        const englishLevelSelect = document.getElementById('english-level');
        const englishBtn = document.getElementById('english-btn');
        const englishStoryDisplay = document.getElementById('english-story');

        englishBtn.addEventListener('click', () => {
            const level = englishLevelSelect.value;
            const storyPool = stories.english[level];
            const randomIndex = Math.floor(Math.random() * storyPool.length);
            const story = storyPool[randomIndex];

            let storyHtml = `<div class="story-title">${story.title}</div>`;
            storyHtml += `<img src="${story.img}" alt="Illustration for ${story.title}">`;
            
            story.content.forEach(sentence => {
                storyHtml += `
                    <div class="sentence-block">
                        <div class="english-sentence">${sentence.en}</div>
                        <div class="english-reading">(${sentence.read})</div>
                        <div class="english-translation">${sentence.th}</div>
                    </div>
                `;
            });

            englishStoryDisplay.innerHTML = storyHtml;
        });
    </script>
</body>
</html>
